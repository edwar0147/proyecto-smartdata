name: Despliegue de ADF a Producción
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-adf:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama adf_publish
        uses: actions/checkout@v3
        with:
          ref: 'adf_publish'

      - name: Iniciar sesión en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Desplegar Plantilla ARM en Producción
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: 'rg-proyecto-sm'
          template: './adf-ecv-dev/ARMTemplateForFactory.json'
          parameters: >
            ./adf-ecv-dev/ARMTemplateParametersForFactory.json
            factoryName=adf-ecv-prod
            ls_databricks_ecv_accessToken=${{ secrets.DATABRICKS_TOKEN }}
            ls_adls_raw_accountKey=${{ secrets.ADLS_ACCOUNT_KEY }}
            AzureSqlDatabase1_properties_typeProperties_database=ecv-prod
